---
name: Tests
permissions:
  contents: read
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.14.3"

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.5"
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Run tests
        run: uv run --frozen pytest --cov=adjunct --cov-report=xml --cov-report=term

      - uses: actions/upload-artifact@v4
        if: (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && matrix.python-version == "3.14"
        with:
          name: coverage-report
          path: coverage.xml

  upload-coverage:
    needs: test
    if: ${{ !cancelled() && needs.build.result == 'success' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      code-quality: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - uses: actions/upload-code-coverage@v1
        with:
          file: coverage.xml
          language: python
          label: code-coverage/adjunct
